<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #0d1117; }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .shape { 
            position: absolute; width: 80px; height: 80px; 
            background: rgba(255, 255, 255, 0.1); border-radius: 50%;
            animation: float 6s infinite ease-in-out; z-index: 0;
        }

        /* Container for content */
        #main-container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
            text-align: center; position: relative; z-index: 1;
        }

        h1 { font-size: 80px; font-weight: 800; }
        h2 { font-size: 30px; opacity: 0.8; margin-top: 10px; }

        nav { margin-top: 40px; display: flex; gap: 30px; }
        nav a { color: white; cursor: pointer; font-size: 20px; font-weight: bold; padding: 10px; transition: 0.3s; }
        nav a:hover { color: #58a6ff; }
    </style>
</head>
<body>

    <!-- Floating Shapes (Like the Screenshot 2026-06-01 010600.png) -->
    <div class="shape" style="top: 20%; left: 15%;"></div>
    <div class="shape" style="top: 60%; left: 80%; width: 120px; height: 120px; animation-delay: 2s;"></div>
    <div class="shape" style="top: 30%; left: 70%; width: 50px; height: 50px; animation-delay: 1s;"></div>

    <div id="main-container">
        <h1>AMAN SHARMA</h1>
        <h2>ENGINEER | NITIAN</h2>
        <nav>
            <a>HOME</a>
            <a>SKILLS</a>
            <a>ABOUT</a>
        </nav>
    </div>

</body>
</html>
