<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* Background Layer - Smooth Transition */
        .bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: opacity 0.8s ease-in-out; z-index: -1;
        }

        #container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
        }

        h1 { font-size: 100px; margin: 0; text-shadow: 3px 3px 15px rgba(0,0,0,0.5); }
        h2 { font-size: 40px; margin-top: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* Navigation - Black Theme */
        nav { margin-top: 50px; display: flex; gap: 30px; }
        nav a { 
            color: black; background: rgba(255, 255, 255, 0.85);
            padding: 12px 25px; text-decoration: none; font-size: 22px; 
            font-weight: bold; cursor: pointer; border-radius: 50px;
            position: relative; transition: 0.3s;
        }

        /* Dhire-dhire aane wali line */
        nav a::after {
            content: ""; position: absolute; bottom: 5px; left: 25px; width: 0; 
            height: 3px; background: black; 
            transition: width 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        nav a:hover::after { width: 60%; }
        nav a:hover { background: white; transform: translateY(-5px); }
    </style>
</head>
<body>

    <!-- Backgrounds (Pre-loaded) -->
    <div id="bg1" class="bg" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb'); opacity: 1;"></div>
    <div id="bg2" class="bg" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b'); opacity: 0;"></div>
    <div id="bg3" class="bg" style="background-image: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e'); opacity: 0;"></div>

    <div id="container">
        <div id="content">
            <h1>AMAN SHARMA</h1>
            <h2>ENGINEER | NITIAN</h2>
        </div>

        <nav>
            <a onclick="update('bg1', 'AMAN SHARMA', 'ENGINEER | NITIAN')">HOME</a>
            <a onclick="update('bg2', 'MY SKILLS', 'PYTHON | WEB DEV | C++')">SKILLS</a>
            <a onclick="update('bg3', 'ABOUT ME', 'PASSIONATE DESIGNER')">ABOUT</a>
        </nav>
    </div>

    <script>
        function update(bgId, title, sub) {
            // Background fade
            document.querySelectorAll('.bg').forEach(el => el.style.opacity = '0');
            document.getElementById(bgId).style.opacity = '1';
            
            // Content update
            document.getElementById('content').innerHTML = "<h1>" + title + "</h1><h2>" + sub + "</h2>";
        }
    </script>
</body>
</html>
