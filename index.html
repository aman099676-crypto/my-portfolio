<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #0d1117; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, #db2777, #7c3aed); filter: blur(100px); opacity: 0.4; z-index: -1; animation: pulse 5s infinite alternate; }
        @keyframes pulse { from { transform: scale(0.8); } to { transform: scale(1.2); } }
        .content { text-align: center; }
        h1 { font-size: 60px; }
        .nav { margin-top: 20px; }
        button { background: transparent; color: white; border: 1px solid #30363d; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #30363d; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="content">
        <h1 id="t">AMAN SHARMA</h1>
        <p id="s">ENGINEER | NITIAN</p>
        <div class="nav">
            <button onclick="up('AMAN SHARMA', 'ENGINEER | NITIAN')">HOME</button>
            <button onclick="up('MY SKILLS', 'PYTHON | WEB DEV')">SKILLS</button>
        </div>
    </div>
    <script>
        function up(t, s) { document.getElementById('t').innerText = t; document.getElementById('s').innerText = s; }
    </script>
</body>
</html>
