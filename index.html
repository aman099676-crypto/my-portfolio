<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        .bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: opacity 1.2s ease-in-out; z-index: -1;
        }

        /* Content Center mein set karne ke liye */
        #container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
        }

        h1 { font-size: 110px; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        h2 { font-size: 45px; margin-top: 10px; font-weight: 300; opacity: 0.9; }

        /* Navigation - Koi box nahi, sirf simple text */
        nav { margin-top: 50px; display: flex; gap: 40px; }
        nav a { 
            color: white; text-decoration: none; font-size: 20px; 
            font-weight: 600; cursor: pointer; position: relative;
            padding: 10px; transition: 0.3s;
        }

        /* Niche aane wali line */
        nav a::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 0; 
            height: 2px; background: white; transition: width 0.5s ease;
        }
        nav a:hover::after { width: 100%; }
        nav a:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="bg1" class="bg" style="background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); opacity: 1;"></div>
    <div id="bg2" class="bg" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e'); opacity: 0;"></div>
    <div id="bg3" class="bg" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05'); opacity: 0;"></div>

    <div id="container">
        <div id="content" style="text-align: center;">
            <h1>AMAN SHARMA</h1>
            <h2>ENGINEER | NITIAN</h2>
        </div>

        <nav>
            <a onclick="update('bg1', 'AMAN SHARMA', 'ENGINEER | NITIAN')">HOME</a>
            <a onclick="update('bg2', 'MY SKILLS', 'PYTHON | WEB DEV | C++')">SKILLS</a>
            <a onclick="update('bg3', 'ABOUT ME', 'PASSIONATE DESIGNER')">ABOUT</a>
        </nav>
    </div>

    <script>
        function update(bgId, title, sub) {
            document.querySelectorAll('.bg').forEach(el => el.style.opacity = '0');
            document.getElementById(bgId).style.opacity = '1';
            document.getElementById('content').innerHTML = "<h1>" + title + "</h1><h2>" + sub + "</h2>";
        }
    </script>
</body>
</html>
