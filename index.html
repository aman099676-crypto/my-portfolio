<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; color: white; 
            text-align: center; height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background-size: cover; background-position: center; 
            transition: background 0.5s ease;
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');
        }
        
        h1 { font-size: 80px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        h2 { font-size: 40px; margin-top: 10px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        
        /* Navigation - Ab Black text */
        nav { margin-top: 40px; display: flex; gap: 40px; }
        nav a { 
            color: black; /* Text black */
            background-color: rgba(255, 255, 255, 0.7); /* Halka white background taaki black text dikhe */
            padding: 10px 20px;
            text-decoration: none; font-size: 20px; font-weight: bold;
            cursor: pointer; position: relative; border-radius: 5px;
        }
        
        /* Smooth underline */
        nav a::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 0; 
            height: 3px; background: black; 
            transition: width 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        nav a:hover::after { width: 100%; }
    </style>
</head>
<body>

    <div id="content">
        <h1>AMAN SHARMA</h1>
        <h2>ENGINEER | NITIAN</h2>
    </div>

    <nav>
        <a onclick="update('AMAN SHARMA', 'ENGINEER | NITIAN', 'https://images.unsplash.com/photo-1506744038136-46273834b3fb')">HOME</a>
        <a onclick="update('MY SKILLS', 'PYTHON | WEB DEV | C++', 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b')">SKILLS</a>
        <a onclick="update('ABOUT ME', 'PASSIONATE DESIGNER', 'https://images.unsplash.com/photo-1470770841072-f978cf4d019e')">ABOUT</a>
    </nav>

    <script>
        const images = [
            'https://images.unsplash.com/photo-1506744038136-46273834b3fb',
            'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b',
            'https://images.unsplash.com/photo-1470770841072-f978cf4d019e'
        ];
        images.forEach(src => { new Image().src = src; });

        function update(title, subtitle, imgUrl) {
            document.body.style.backgroundImage = "url('" + imgUrl + "')";
            document.getElementById('content').innerHTML = "<h1>" + title + "</h1><h2>" + subtitle + "</h2>";
        }
    </script>
</body>
</html>
