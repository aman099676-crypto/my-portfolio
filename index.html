<!DOCTYPE html>
<html>
<head>
    <style>
        /* Essential for Zero Lag */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; font-family: sans-serif; }
        
        .bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 0.5s ease-out; /* Fast transition */
            z-index: -1; will-change: opacity; /* Smooth GPU boost */
        }

        #main-container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
            text-align: center;
        }

        h1 { font-size: 80px; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        h2 { font-size: 30px; margin-bottom: 30px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        nav { display: flex; gap: 30px; }
        nav a { 
            color: white; text-decoration: none; font-size: 20px; 
            font-weight: bold; cursor: pointer; position: relative; padding: 5px;
        }
        nav a::after {
            content: ""; position: absolute; bottom: -5px; left: 0; width: 0; 
            height: 2px; background: white; transition: 0.3s;
        }
        nav a:hover::after { width: 100%; }
    </style>
</head>
<body>

    <!-- Images pre-loaded via browser cache -->
    <div id="bg1" class="bg" style="background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); opacity: 1;"></div>
    <div id="bg2" class="bg" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e');"></div>
    <div id="bg3" class="bg" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05');"></div>

    <div id="main-container">
        <div id="content">
            <h1>AMAN SHARMA</h1>
            <h2>ENGINEER | NITIAN</h2>
        </div>

        <nav>
            <a onclick="update('bg1', 'AMAN SHARMA', 'ENGINEER | NITIAN')">HOME</a>
            <a onclick="update('bg2', 'MY SKILLS', 'PYTHON | WEB DEV | C++')">SKILLS</a>
            <a onclick="update('bg3', 'ABOUT ME', 'PASSIONATE DESIGNER')">ABOUT</a>
        </nav>
    </div>

    <script>
        function update(bgId, title, sub) {
            // Instant hide others, show target
            document.querySelectorAll('.bg').forEach(el => el.style.opacity = '0');
            document.getElementById(bgId).style.opacity = '1';
            
            // Content update
            document.getElementById('content').innerHTML = "<h1>" + title + "</h1><h2>" + sub + "</h2>";
        }
    </script>
</body>
</html>
