<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #0d1117; }

        /* Glowing Pink/Purple Blobs (The "GitHub" style floating effect) */
        @keyframes move {
            0% { transform: translate(0, 0); }
            50% { transform: translate(100px, 50px); }
            100% { transform: translate(0, 0); }
        }

        .blob { 
            position: absolute; width: 300px; height: 300px; 
            background: radial-gradient(circle, #ff007f, #7b2cbf); 
            filter: blur(80px); opacity: 0.6; border-radius: 50%;
            animation: move 10s infinite alternate ease-in-out; z-index: 0;
        }

        #main-container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
            text-align: center; position: relative; z-index: 1;
        }

        h1 { font-size: 80px; font-weight: 800; margin-bottom: 10px; }
        h2 { font-size: 30px; opacity: 0.8; margin-bottom: 30px; }

        nav { display: flex; gap: 40px; }
        nav a { 
            color: white; text-decoration: none; font-size: 20px; 
            font-weight: bold; cursor: pointer; padding: 10px; transition: 0.3s;
        }
        nav a:hover { color: #ff007f; }
    </style>
</head>
<body>

    <!-- Pink/Purple Floating Blobs -->
    <div class="blob" style="top: -100px; left: -100px;"></div>
    <div class="blob" style="bottom: -100px; right: -100px; animation-delay: -5s;"></div>

    <div id="main-container">
        <div id="content">
            <h1 id="title">AMAN SHARMA</h1>
            <h2 id="subtitle">ENGINEER | NITIAN</h2>
        </div>

        <nav>
            <a onclick="update('AMAN SHARMA', 'ENGINEER | NITIAN')">HOME</a>
            <a onclick="update('MY SKILLS', 'PYTHON | WEB DEV | C++')">SKILLS</a>
            <a onclick="update('ABOUT ME', 'PASSIONATE DESIGNER')">ABOUT</a>
        </nav>
    </div>

    <script>
        function update(title, sub) {
            document.getElementById('title').innerText = title;
            document.getElementById('subtitle').innerText = sub;
        }
    </script>
</body>
</html>
