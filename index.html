<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Background Container */
        .bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 0.6s ease-in-out; z-index: -1;
        }

        #main-container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
            text-align: center;
        }

        h1 { font-size: 100px; font-weight: 800; margin-bottom: 5px; text-shadow: 2px 2px 20px rgba(0,0,0,0.5); }
        h2 { font-size: 35px; margin-bottom: 40px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* Navigation */
        nav { display: flex; gap: 40px; }
        nav a { 
            color: white; text-decoration: none; font-size: 22px; 
            font-weight: bold; cursor: pointer; position: relative; padding: 5px;
        }
        /* Line animation */
        nav a::after {
            content: ""; position: absolute; bottom: -5px; left: 0; width: 0; 
            height: 3px; background: #fff; transition: width 0.4s ease;
        }
        nav a:hover::after { width: 100%; }
    </style>
</head>
<body>

    <!-- Different Backgrounds -->
    <div id="bg1" class="bg" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb'); opacity: 1;"></div>
    <div id="bg2" class="bg" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05');"></div>
    <div id="bg3" class="bg" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e');"></div>

    <div id="main-container">
        <div id="content">
            <h1 id="title">AMAN SHARMA</h1>
            <h2 id="sub">ENGINEER | NITIAN</h2>
        </div>

        <nav>
            <a onclick="show('bg1', 'AMAN SHARMA', 'ENGINEER | NITIAN')">HOME</a>
            <a onclick="show('bg2', 'MY SKILLS', 'PYTHON | WEB DEV | C++')">SKILLS</a>
            <a onclick="show('bg3', 'ABOUT ME', 'PASSIONATE DESIGNER')">ABOUT</a>
        </nav>
    </div>

    <script>
        function show(bgId, title, sub) {
            // Hide all backgrounds
            document.querySelectorAll('.bg').forEach(el => el.style.opacity = '0');
            // Show selected background
            document.getElementById(bgId).style.opacity = '1';
            // Update text
            document.getElementById('title').innerText = title;
            document.getElementById('sub').innerText = sub;
        }
    </script>
</body>
</html>
